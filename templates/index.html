<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>My Team</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <div class="app page">
    <div class="app-header">
      <div class="team-card">
        <div class="team-blur-bg" id="team-blur-bg"></div>
        <div class="team-grid" id="team-grid"></div>
      </div>

      <h1>my team</h1>
      <p class="date-text" id="date-text"></p>
      <p class="progress-text" id="progress-text">list progress: 0%</p>

      <div class="add-wrap">
        <div class="companion-row empty" id="companion-row">
          <img class="companion-img" id="companion-img" alt="" />
          <img class="shiny-fx" id="shiny-fx" alt="" />
        </div>

        <form id="add-form" class="add-row">
          <input type="text" id="new-item" placeholder="add a task…" autocomplete="off" required />
          <button type="submit">add</button>
        </form>
      </div>

      <div class="header-fade"></div>
    </div>

    <div class="list-scroll">
      <ul id="todo-list" class="todo-list"></ul>
    </div>
  </div>

  <div class="page dex-page off-right" id="dex-page">
    <h1 class="dex-title">pokedex</h1>
    <div class="dex-tabs">
      <button class="dex-tab active" data-tab="all">all</button>
      <button class="dex-tab" data-tab="shiny">shiny
        <svg class="shiny-star" viewBox="0 0 100 100" fill="currentColor"><path d="M34 30 Q37.84 58.16 66 62 Q37.84 65.84 34 94 Q30.16 65.84 2 62 Q30.16 58.16 34 30 Z"/><path d="M74 12 Q76.88 33.12 98 36 Q76.88 38.88 74 60 Q71.12 38.88 50 36 Q71.12 33.12 74 12 Z"/><path d="M28 1 Q29.32 10.68 39 12 Q29.32 13.32 28 23 Q26.68 13.32 17 12 Q26.68 10.68 28 1 Z"/></svg>
      </button>
    </div>
    <div class="dex-card">
      <div class="dex-grid" id="dex-grid"></div>
    </div>
  </div>

  <button class="settings-fab" id="settings-fab" aria-label="Settings">
    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
      <line x1="3" y1="6" x2="21" y2="6"></line>
      <line x1="3" y1="12" x2="21" y2="12"></line>
      <line x1="3" y1="18" x2="21" y2="18"></line>
    </svg>
  </button>

  <div class="pokedex-overlay hidden" id="pokedex-overlay">
    <div class="pokedex-panel" id="pokedex-panel">
      <button class="pokedex-close" id="pokedex-close" aria-label="Close">✕</button>
      <div class="pokedex-content" id="pokedex-content"></div>
    </div>
  </div>

  <div class="settings-overlay hidden" id="settings-overlay">
    <div class="settings-panel">
      <div class="settings-header">
        <h2>settings</h2>
        <button class="settings-close" id="settings-close">✕</button>
      </div>

      <div class="settings-section">
        <span class="settings-label">theme</span>
        <div class="theme-toggle">
          <button class="theme-btn" data-theme="light">light</button>
          <button class="theme-btn" data-theme="dark">dark</button>
        </div>
      </div>

      <div class="settings-section">
        <span class="settings-label">colors</span>
        <div class="color-row">
          <label for="color-add">accent color</label>
          <div class="color-row-controls">
            <button type="button" class="match-companion-btn" id="match-companion-btn">match companion</button>
            <input type="color" id="color-add" />
          </div>
        </div>
        <div class="color-row">
          <label for="color-not-started">not started</label>
          <input type="color" id="color-not-started" />
        </div>
        <div class="color-row">
          <label for="color-in-progress">in progress...</label>
          <input type="color" id="color-in-progress" />
        </div>
        <div class="color-row">
          <label for="color-done">done!</label>
          <input type="color" id="color-done" />
        </div>
      </div>

      <div class="settings-section">
        <span class="settings-label">companion</span>
        <select class="companion-select" id="companion-select"></select>
      </div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
